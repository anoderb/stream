<!doctype html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Nobaryu — nonton bareng streaming olahraga live, gratis, langsung play." />
  <title>Nobaryu — Nonton Bareng Sport Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <header class="nav-wrap">
    <div class="wrap nav">
      <div class="brand">
        <div class="logo-mark">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L3 7v6l7 5 7-5V7L10 2z" fill="#080b12" opacity="0.9"/>
            <circle cx="10" cy="10" r="3" fill="#080b12"/>
          </svg>
        </div>
        <span class="brand-name">nobar<em>yu</em></span>
      </div>
      <div class="nav-actions">
        <button class="icon-btn" id="themeBtn" title="Toggle tema">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" id="themeIcon"/>
          </svg>
        </button>
        <button class="refresh-btn" id="topRefresh">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">

      <!-- HERO -->
      <section class="hero">
        <div class="hero-inner">
          <div>
            <div class="hero-eyebrow">
              <div class="live-dot"></div>
              <span>Sport streaming live</span>
            </div>
            <h1>Nonton<br><em>bareng,</em><br>gampang.</h1>
            <p class="hero-desc">Portal streaming olahraga live. Pilih event, pilih server, langsung tonton. Gratis, ringan, tanpa ribet.</p>
          </div>
          <div class="stats-row" id="statsRow">
            <div class="stat-item">
              <div class="stat-num" id="sLive">0</div>
              <div class="stat-label">Live</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <div class="stat-num" id="sUpcoming">0</div>
              <div class="stat-label">Upcoming</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <div class="stat-num" id="sTotal">0</div>
              <div class="stat-label">Events</div>
            </div>
          </div>
        </div>

        <div class="search-row">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" id="search" placeholder="Cari match, liga, olahraga..." autocomplete="off" />
          </div>
          <button class="clear-btn" id="clearBtn" title="Clear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <button class="icon-btn" id="refreshBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div class="meta-bar" id="meta">Memuat data...</div>
      </section>

      <!-- CATEGORIES -->
      <nav class="cats-wrap" id="cats"></nav>

      <!-- SECTION HEADER -->
      <div class="section-head">
        <span class="section-title">Semua Event</span>
        <span class="section-count" id="sCount">0 event</span>
      </div>

      <!-- GRID -->
      <div class="events-grid" id="grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>

    </div>
  </main>

  <!-- MODAL PLAYER -->
  <div class="modal-overlay" id="modal" aria-hidden="true">
    <div class="player-sheet">
      <div class="player-head">
        <div class="player-info">
          <div class="player-title" id="playerTitle">Player</div>
          <div class="player-sub" id="playerSub"></div>
        </div>
        <button class="player-close" id="closeBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="frame-wrap"><iframe id="frame" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe></div>
      <div class="player-foot">
        <div class="server-label">Pilih Server</div>
        <div class="server-tabs" id="serverTabs"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
